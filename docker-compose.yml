version: '3.8'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: caresphere
      POSTGRES_PASSWORD: caresphere
      POSTGRES_DB: caresphere
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  adminer:
    image: adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
